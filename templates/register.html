<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Регистрация</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>Регистрация</h1>
    <p class="muted">Создайте аккаунт, чтобы сохранять рецепты.</p>

    <form id="registerForm" class="stack">
      <input id="email" type="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Пароль от 6 символов" required>
      <button type="submit">Создать аккаунт</button>
    </form>

    <p id="status" class="status"></p>
    <p class="muted">Уже есть аккаунт? <a href="/login">Войти</a></p>
  </main>

  <script>
    // Здесь логика почти такая же, как на странице входа, только запрос другой.
    const form = document.getElementById("registerForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Ошибка регистрации.");
        }

        window.location.href = "/recipes";
      } catch (error) {
        status.textContent = error.message;
        status.className = "status error";
      }
    });
  </script>
</body>
</html>
