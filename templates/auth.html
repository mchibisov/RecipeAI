<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RecipeAI Auth</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1 id="title">Sign In</h1>

    <form id="authForm" class="stack">
      <input id="email" type="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Password" required>
      <button id="submitButton" type="submit">Sign In</button>
    </form>

    <p id="status" class="status"></p>

    <div class="switch">
      <button id="loginMode" class="secondary" type="button">Sign In</button>
      <button id="registerMode" class="secondary" type="button">Register</button>
    </div>
  </main>

  <script>
    let mode = "login";

    function $(id) {
      return document.getElementById(id);
    }

    function setMode(nextMode) {
      mode = nextMode;
      $("title").textContent = mode === "login" ? "Sign In" : "Register";
      $("submitButton").textContent = mode === "login" ? "Sign In" : "Register";
      $("status").textContent = "";
    }

    async function sendAuth(event) {
      event.preventDefault();

      const response = await fetch("/api/auth/" + mode, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: $("email").value,
          password: $("password").value
        })
      });
      const data = await response.json();

      if (response.ok) {
        window.location.href = "/recipes";
      } else {
        $("status").textContent = data.error || "Auth error.";
      }
    }

    $("loginMode").addEventListener("click", () => setMode("login"));
    $("registerMode").addEventListener("click", () => setMode("register"));
    $("authForm").addEventListener("submit", sendAuth);
  </script>
</body>
</html>
