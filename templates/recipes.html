<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RecipeAI</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <h1>RecipeAI</h1>
      <div>
        <span id="userEmail" class="muted"></span>
        <button id="logoutButton" class="secondary">Sign Out</button>
      </div>
    </header>

    <section class="card">
      <h2>Search Recipe</h2>
      <div class="row">
        <input id="searchInput" placeholder="chicken, pasta, soup">
        <button id="searchButton">Search</button>
      </div>
      <p id="searchStatus" class="status"></p>
      <div id="results" class="recipes"></div>
    </section>

    <section class="card">
      <h2>Ask Mistral</h2>
      <div class="stack">
        <select id="recipeSelect">
          <option value="">Search and choose a recipe</option>
        </select>
        <textarea id="questionInput" placeholder="How can I make this recipe faster?"></textarea>
        <button id="askButton">Ask</button>
      </div>
      <pre id="answer">The answer will appear here.</pre>
    </section>
  </main>

  <script>
    let recipes = [];

    function $(id) {
      return document.getElementById(id);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "Server error.");
      }
      return data;
    }

    async function loadUser() {
      const data = await api("/api/auth/me");
      if (!data.user) {
        window.location.href = "/auth";
        return;
      }
      $("userEmail").textContent = data.user.email;
    }

    async function searchRecipes() {
      const query = $("searchInput").value.trim();
      if (!query) {
        $("searchStatus").textContent = "Enter a search query.";
        return;
      }

      $("searchStatus").textContent = "Searching...";
      const data = await api("/api/recipes/search?q=" + encodeURIComponent(query));
      recipes = data.items;
      renderRecipes();
      $("searchStatus").textContent = "Found: " + recipes.length;
    }

    function renderRecipes() {
      $("results").innerHTML = "";
      $("recipeSelect").innerHTML = "<option value=''>Choose a recipe</option>";

      for (const recipe of recipes) {
        $("recipeSelect").insertAdjacentHTML(
          "beforeend",
          `<option value="${recipe.meal_id}">${escapeHtml(recipe.title)}</option>`
        );

        $("results").insertAdjacentHTML("beforeend", `
          <article class="recipe">
            <img src="${recipe.image_url}" alt="${escapeHtml(recipe.title)}">
            <div>
              <h3>${escapeHtml(recipe.title)}</h3>
              <p class="muted">${escapeHtml(recipe.category)} ${escapeHtml(recipe.area)}</p>
              <button data-id="${recipe.meal_id}">Choose</button>
            </div>
          </article>
        `);
      }

      document.querySelectorAll("[data-id]").forEach((button) => {
        button.addEventListener("click", () => {
          $("recipeSelect").value = button.dataset.id;
        });
      });
    }

    async function askMistral() {
      const recipe = recipes.find((item) => item.meal_id === $("recipeSelect").value);
      const question = $("questionInput").value.trim();

      if (!recipe || !question) {
        $("answer").textContent = "Choose a recipe and enter a question.";
        return;
      }

      $("answer").textContent = "Mistral is thinking...";
      const data = await api("/api/ai", {
        method: "POST",
        body: JSON.stringify({ recipe, question })
      });
      $("answer").textContent = data.answer;
    }

    async function logout() {
      await api("/api/auth/logout", { method: "POST", body: "{}" });
      window.location.href = "/auth";
    }

    $("searchButton").addEventListener("click", searchRecipes);
    $("askButton").addEventListener("click", askMistral);
    $("logoutButton").addEventListener("click", logout);
    loadUser();
  </script>
</body>
</html>
