<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecipeAI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1>RecipeAI</h1>
        <div>
          <span id="userEmail" class="muted"></span>
          <button id="logoutButton" class="secondary">Sign Out</button>
        </div>
      </header>

      <section class="card">
        <h2>Search Recipe</h2>
        <div class="row">
          <input id="searchInput" placeholder="chicken, pasta, soup" />
          <button id="searchButton">Search</button>
        </div>
        <p id="searchStatus" class="status"></p>
        <div id="results" class="recipes"></div>
      </section>
    </main>

    <dialog
      id="recipeModal"
      class="card"
      style="
        width: min(900px, calc(100% - 32px));
        max-height: 90vh;
        overflow: auto;
      "
    >
      <div class="topbar">
        <h2 id="modalRecipeTitle"></h2>
        <button id="closeModalButton" class="secondary" type="button">
          Close
        </button>
      </div>
      <article class="recipe">
        <img id="modalRecipeImage" src="" alt="" />
        <div class="stack">
          <p id="modalRecipeMeta" class="muted"></p>
          <div>
            <h3>Ingredients</h3>
            <ul id="modalRecipeIngredients"></ul>
          </div>
          <div>
            <h3>Instructions</h3>
            <p id="modalRecipeInstructions"></p>
          </div>
          <div class="stack">
            <h3>Ask Mistral</h3>
            <textarea
              id="questionInput"
              placeholder="How can I make this recipe faster?"
            ></textarea>
            <button id="askButton" type="button">Ask</button>
          </div>
          <pre id="answer">The answer will appear here.</pre>
        </div>
      </article>
    </dialog>

    <script>
      // Объявление глобального массива для хранения списка рецептов, полученных от API
      let recipes = [];
      // Объявление переменной для хранения объекта рецепта, выбранного пользователем в данный момент
      let currentRecipe = null;

      // Функция-хелпер для быстрого поиска HTML-элементов по их уникальному атрибуту id
      function $(id) {
        // Возвращает объект DOM-элемента из дерева документа
        return document.getElementById(id);
      }

      // Функция экранирования HTML-символов для предотвращения XSS-атак (внедрения вредоносного JS-кода)
      function escapeHtml(text) {
        // Принудительное приведение входного значения к строковому типу
        return (
          String(text)
            // Замена символа амперсанда на безопасную HTML-сущность &amp;
            .replaceAll("&", "&amp;")
            // Замена знака "меньше" (начало HTML-тега) на безопасную сущность &lt;
            .replaceAll("<", "&lt;")
            // Замена знака "больше" (конец HTML-тега) на безопасную сущность &gt;
            .replaceAll(">", "&gt;")
            // Замена двойных кавычек на безопасную сущность &quot;
            .replaceAll('"', "&quot;")
        );
      }

      // Универсальная асинхронная функция-обертка для отправки HTTP-запросов к нашему Flask API
      async function api(path, options = {}) {
        // Вызов fetch; деструктуризация ...options подставляет метод (POST/GET) и тело запроса (body)
        const response = await fetch(path, {
          // Стандартный заголовок, указывающий, что клиент обменивается с сервером данными в формате JSON
          headers: { "Content-Type": "application/json" },
          // Развертывание дополнительных параметров (например, method, body), переданных при вызове функции
          ...options,
        });
        // Чтение тела ответа и десериализация JSON; метод .catch() вернет пустой объект {}, если JSON невалиден
        const data = await response.json().catch(() => ({}));
        // Если HTTP-статус ответа не входит в диапазон успешных (200-299), генерируем ошибку
        if (!response.ok) {
          // Создание исключения с текстом ошибки от бэкенда или дефолтным сообщением "Server error."
          throw new Error(data.error || "Server error.");
        }
        // Возврат распарсенных данных в случае успешного выполнения запроса
        return data;
      }

      // Функция отрисовки и открытия модального окна (диалога) с подробной информацией о рецепте
      function openRecipeModal(recipe) {
        // Сохранение переданного объекта рецепта в глобальную переменную сессии
        currentRecipe = recipe;
        // Запись названия блюда в заголовок модального окна
        $("modalRecipeTitle").textContent = recipe.title;
        // Установка ссылки на изображение в атрибут src тега img
        $("modalRecipeImage").src = recipe.image_url;
        // Установка альтернативного текста (атрибут alt) для изображения
        $("modalRecipeImage").alt = recipe.title;
        // Фильтрация (удаление пустых полей) и объединение категории и кухни через пробел в одну строку
        $("modalRecipeMeta").textContent = [recipe.category, recipe.area]
          .filter(Boolean)
          .join(" ");
        // Формирование списка ингредиентов: маппинг массива объектов в строки <li> с вызовом экранирования XSS
        $("modalRecipeIngredients").innerHTML = recipe.ingredients
          .map(
            (item) =>
              `<li>${escapeHtml([item.measure, item.name].filter(Boolean).join(" "))}</li>`,
          )
          // Объединение массива строк в одну сплошную HTML-строку
          .join("");
        // Запись пошаговой инструкции приготовления в текстовый блок
        $("modalRecipeInstructions").textContent = recipe.instructions;
        // Очистка поля ввода вопроса к нейросети Mistral перед новым запросом
        $("questionInput").value = "";
        // Сброс текста ответа ИИ до дефолтного состояния
        $("answer").textContent = "The answer will appear here.";
        // Встроенный метод HTML5 для открытия элемента <dialog> поверх страницы в качестве модального окна
        $("recipeModal").showModal();
      }

      // Асинхронная функция проверки авторизации и отображения email текущего пользователя
      async function loadUser() {
        // Запрос к эндпоинту бэкенда для получения данных текущей сессии
        const data = await api("/api/auth/me");
        // Если бэкенд вернул пустой объект сессии (пользователь не авторизован или cookie просрочена)
        if (!data.user) {
          // Принудительный клиентский редирект на страницу авторизации
          window.location.href = "/auth";
          // Выход из функции (прерывание дальнейшего выполнения кода)
          return;
        }
        // Если пользователь авторизован, выводим его email в шапку сайта (topbar)
        $("userEmail").textContent = data.user.email;
      }

      // Асинхронная функция для отправки поискового запроса рецептов на бэкенд
      async function searchRecipes() {
        // Получение значения строки поиска из инпута с удалением пробелов по краям (.trim())
        const query = $("searchInput").value.trim();
        // Если строка поиска пуста, выводим предупреждение и прерываем поиск
        if (!query) {
          $("searchStatus").textContent = "Enter a search query.";
          return;
        }

        // Визуальное уведомление пользователя о начале сетевого процесса поиска
        $("searchStatus").textContent = "Searching...";
        // GET-запрос к API; метод encodeURIComponent кодирует спецсимволы и пробелы для безопасной передачи в URL
        const data = await api(
          "/api/recipes/search?q=" + encodeURIComponent(query),
        );
        // Сохранение полученного от сервера массива рецептов в глобальную переменную
        recipes = data.items;
        // Вызов функции генерации HTML-карточек для отображения найденных блюд на экране
        renderRecipes();
        // Вывод финального статуса с количеством найденных элементов
        $("searchStatus").textContent = "Found: " + recipes.length;
      }

      // Функция динамической генерации и отрисовки HTML-кода карточек рецептов на странице
      function renderRecipes() {
        // Полная очистка контейнера результатов от старых карточек
        $("results").innerHTML = "";

        // Цикл, последовательно обходящий каждый объект рецепта в глобальном массиве recipes
        for (const recipe of recipes) {
          // Вставка сгенерированного HTML-шаблона карточки в конец контейнера результатов
          $("results").insertAdjacentHTML(
            "beforeend",
            `
          <article class="recipe">
            <img src="${recipe.image_url}" alt="${escapeHtml(recipe.title)}">
            <div>
              <h3>${escapeHtml(recipe.title)}</h3>
              <p class="muted">${escapeHtml(recipe.category)} ${escapeHtml(recipe.area)}</p>
              <button type="button" data-id="${recipe.meal_id}">Choose</button>
            </div>
          </article>
        `,
          );
        }

        // Поиск всех созданных кнопок по селектору дата-атрибута [data-id] и обход их циклом forEach
        document.querySelectorAll("[data-id]").forEach((button) => {
          // Навешивание слушателя клика на каждую кнопку «Choose»
          button.addEventListener("click", (event) => {
            // Отмена стандартного поведения браузера для безопасности
            event.preventDefault();
            // Поиск объекта рецепта в массиве recipes, чей id совпадает со строковым ID из дата-атрибута кнопки
            const recipe = recipes.find(
              (item) => item.meal_id === button.dataset.id,
            );
            // Если рецепт успешно найден в локальном массиве
            if (recipe) {
              // Вызов функции открытия модального окна и передача туда объекта рецепта
              openRecipeModal(recipe);
            }
          });
        });
      }

      // Асинхронная функция отправки контекста рецепта и вопроса пользователя в Mistral AI
      async function askMistral() {
        // Получение очищенного от пробелов текста вопроса из поля textarea
        const question = $("questionInput").value.trim();

        // Валидация: если рецепт не выбран или текстовое поле вопроса пустое
        if (!currentRecipe || !question) {
          // Вывод предупреждения в блок ответа и остановка выполнения функции
          $("answer").textContent = "Choose a recipe and enter a question.";
          return;
        }

        // Информирование пользователя о том, что идет процесс генерации ответа нейросетью
        $("answer").textContent = "Mistral is thinking...";
        // Отправка POST-запроса на бэкенд-эндпоинт /api/ai с передачей JSON-тела
        const data = await api("/api/ai", {
          method: "POST",
          // Сериализация объекта текущего рецепта и вопроса пользователя в JSON-строку
          body: JSON.stringify({ recipe: currentRecipe, question }),
        });
        // Вывод сгенерированного ответа ИИ (из ключа 'answer') в текстовый блок на экране
        $("answer").textContent = data.answer;
      }

      // Асинхронная функция для деавторизации (выхода из аккаунта) пользователя
      async function logout() {
        // Отправка POST-запроса на бэкенд-маршрут логаута с пустым телом запроса
        await api("/api/auth/logout", { method: "POST", body: "{}" });
        // Перенаправление браузера на страницу входа/регистрации после успешного удаления сессии
        window.location.href = "/auth";
      }

      // Привязка функции поиска рецептов к событию клика по кнопке "Search"
      $("searchButton").addEventListener("click", searchRecipes);
      // Привязка функции закрытия стандартного HTML-диалога к клику по кнопке "Close" в модалке
      $("closeModalButton").addEventListener("click", () =>
        $("recipeModal").close(),
      );
      // Привязка функции генерации ответа ИИ к клику по кнопке "Ask" в модальном окне
      $("askButton").addEventListener("click", askMistral);
      // Привязка функции выхода из системы к клику по кнопке "Sign Out" в шапке сайта
      $("logoutButton").addEventListener("click", logout);
      // Автоматический вызов функции проверки сессии при каждой первичной загрузке страницы
      loadUser();
    </script>
  </body>
</html>
